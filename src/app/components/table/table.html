<table mat-table matSort [dataSource]="rounds">
    @for (column of columns; track column.id) {
    <ng-container [matColumnDef]="column.id">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ column.traduction }}</th>
    <td mat-cell *matCellDef="let element">
        @if (column.id === 'name') {
        <a [routerLink]="['/round', element['id']]">{{ element[column.id] }}</a>
        } @else {
        {{ element[column.id] }}
        }
    </td>
    </ng-container>
    }
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
