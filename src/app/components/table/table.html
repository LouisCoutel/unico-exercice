<table mat-table [dataSource]="rounds$">
    <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let element">{{ element.id }}</td>
    </ng-container>
    <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Nom</th>
    <td mat-cell *matCellDef="let element">{{ element.name }}</td>
    </ng-container>
    <ng-container matColumnDef="driver_name">
    <th mat-header-cell *matHeaderCellDef>Conducteur</th>
    <td mat-cell *matCellDef="let element">{{ element.driver_name }}</td>
    </ng-container>
    <ng-container matColumnDef="vehicle_name">
    <th mat-header-cell *matHeaderCellDef>Véhicule</th>
    <td mat-cell *matCellDef="let element">{{ element.vehicle_name }}</td>
    </ng-container>
    <ng-container matColumnDef="duration_s">
    <th mat-header-cell *matHeaderCellDef>Durée (s)</th>
    <td mat-cell *matCellDef="let element">{{ element.duration_s }}</td>
    </ng-container>
    <ng-container matColumnDef="distance_m">
    <th mat-header-cell *matHeaderCellDef>Distance (m)</th>
    <td mat-cell *matCellDef="let element">{{ element.distance_m }}</td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
