<button class="btn btn-xs" routerLink="/rounds">Retour à la liste</button>
<header class="starting:opacity-0 transition-opacity duration-400 rounded-sm border border-slate-100 p-4 bg-white w-fit">
    @if (round$ | async; as round) {
    <div class="flex w-full justify-between mb-4">
        <h1 class="text-xl lg:text-xl xl:text-2xl font-semibold">{{ round.name }}</h1>
    </div>
    <p class="text-base 3xl:text-lg max-w-[75ch]">{{ round.comment }}</p>
    }
</header>
